spring.application.name=inventario
# 1. Dirección y nombre de la base de datos (Cámbialo si tu base de datos se llama distinto)
spring.datasource.url=jdbc:mysql://localhost:3306/pasteleria_db?createDatabaseIfNotExist=true&serverTimezone=UTC

# 2. Tu usuario de MySQL (Por defecto suele ser root)
spring.datasource.username=Max

# 3. La contraseńa que inventaste cuando instalamos MySQL (Ejemplo: admin123 o pasteles123)
spring.datasource.password=Maximo1234521

# 4. Driver de conexión
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 5. Configuración de Hibernate para que cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
